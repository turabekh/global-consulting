<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>New message</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f8fb; margin: 0; padding: 24px;">
  <div style="max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 12px; padding: 32px; box-shadow: 0 1px 3px rgba(15,15,15,0.06);">
    <h1 style="font-size: 20px; font-weight: 700; color: #1a1a1a; margin: 0 0 8px;">
      New message{% if user.first_name %}, {{ user.first_name }}{% endif %}
    </h1>
    <p style="font-size: 14px; color: #6b7280; margin: 0 0 24px;">
      About your <strong>{{ subject_label }}</strong> application.
    </p>

    <div style="background: #f3f0ff; border-left: 3px solid #6e5ef6; border-radius: 8px; padding: 16px 18px; margin-bottom: 24px;">
      <p style="font-size: 14px; line-height: 1.55; color: #1a1a1a; margin: 0; white-space: pre-wrap;">{{ message.body }}</p>
    </div>

    <a href="{{ thread_url }}" style="display: inline-block; background: #6e5ef6; color: #ffffff; text-decoration: none; padding: 10px 24px; border-radius: 999px; font-weight: 600; font-size: 14px;">
      Reply
    </a>

    <p style="font-size: 12px; color: #9ca3af; margin-top: 32px; line-height: 1.5;">
      You're getting this email because there's an update on your application. Sign in to your account to view the full conversation.
    </p>
  </div>
</body>
</html>
