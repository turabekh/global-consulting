[tool.ruff]
target-version = "py313"
line-length = 100
extend-exclude = [
    "migrations",
    ".venv",
]

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "UP",
    "DJ",
    "SIM",
]
ignore = [
    "E501",
]

[tool.ruff.lint.per-file-ignores]
"**/migrations/*.py" = ["E", "F", "I"]
"**/settings.py" = ["F405", "F403"]
