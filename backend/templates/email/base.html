{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>{% block title %}Global Consulting{% endblock %}</title>
</head>
<body style="margin: 0; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f8fb; color: #1a1a1a;">
  <div style="max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 12px; padding: 32px; box-shadow: 0 1px 3px rgba(15,15,15,0.06);">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width: 100%; margin-bottom: 24px;">
      <tr>
        <td style="vertical-align: middle;">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0">
            <tr>
              <td style="vertical-align: middle;">
                <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #c084fc 0%, #ec4899 100%); border-radius: 10px; color: #ffffff; font-weight: 700; font-size: 20px; text-align: center; line-height: 40px;">G</div>
              </td>
              <td style="vertical-align: middle; padding-left: 12px;">
                <span style="font-size: 16px; font-weight: 700; letter-spacing: -0.01em; color: #1a1a1a;">Global Consulting</span>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>

    {% block body %}{% endblock %}

    <div style="border-top: 1px solid #eaeaea; margin-top: 32px; padding-top: 16px; font-size: 12px; color: #9ca3af; line-height: 1.5;">
      {% block footer %}
        Global Consulting — Tashkent, Uzbekistan
      {% endblock %}
    </div>
  </div>
</body>
</html>
